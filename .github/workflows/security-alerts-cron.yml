name: Security Alerts Check

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: # manual trigger for testing

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check security event spikes
        run: |
          set -u
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/security-alerts")
          echo "HTTP status: $code"
          echo "Response body:"
          cat /tmp/body || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::security-alerts endpoint returned HTTP $code"
            exit 1
          fi
