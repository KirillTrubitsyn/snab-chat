name: Unit tests (backend)

# Запускает vitest-тесты бэкенда на каждый push в main и каждый Pull Request,
# затрагивающий backend/. Ловит регрессии до Railway-деплоя.
#
# Триггеры:
#   - push в main (если изменён backend/ или сам workflow);
#   - pull_request в main (та же фильтрация);
#   - workflow_dispatch (ручной запуск из вкладки Actions).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/unit-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

# Параллельные запуски на одной ветке отменяют друг друга, чтобы не
# тратить минуты на устаревшие коммиты при быстрых push-ах.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
